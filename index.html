<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bazaar O Nomics Feedback</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">
  <h1>🚀 Bazaar O Nomics</h1>
  <div class="subtitle">We value your feedback 💬</div>

  <div class="live-rating" id="liveRating">⭐ 0 / 5</div>

  <div class="stars">
    <span>★</span>
    <span>★</span>
    <span>★</span>
    <span>★</span>
    <span>★</span>
  </div>

  <div class="emoji" id="emoji">😐</div>

  <textarea id="text" placeholder="Write feedback..."></textarea>

  <button onclick="submitFeedback()">Submit ✨</button>
</div>

<!-- 🔊 PREMIUM SOUND -->
<audio id="clickSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
